<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>zerollama-dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap');

  :root {
    --bg: #000000;
    --bg-2: #09090b;
    --bg-3: #0f0f12;
    --bg-hover: #1c1c21;
    --fg: #ffffff;
    --fg-dim: #a1a1aa;
    --fg-mute: #52525b;
    --border: #27272a;
    --border-active: #3b82f6;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-2: #60a5fa;
    --good: #10b981;
    --warn: #f59e0b;
    --bad: #ef4444;
    --info: #06b6d4;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --radius: 12px;
    --radius-inner: 6px;
    --glass-bg: rgba(0, 0, 0, 0.9);
    --glass-border: #27272a;
  }

  * { box-sizing: border-box; }
  
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.5 var(--sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a {
    color: var(--accent-2);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  a:hover { color: var(--accent); }

  code, pre, kbd { font-family: var(--mono); }

  button {
    font: inherit; font-weight: 500; color: inherit;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 5px 12px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  button:hover { background: var(--bg-hover); border-color: rgba(255, 255, 255, 0.25); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  select, input {
    font: inherit; color: inherit;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 5px 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.4);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

  /* layout */
  header.app {
    display: flex; gap: 16px; align-items: center;
    padding: 14px 20px; background: var(--glass-bg);
    border-bottom: 1px solid var(--glass-border);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-wrap: wrap;
  }
  header.app .brand {
    font-weight: 700; font-size: 17px;
    letter-spacing: 0.5px;
    color: #ffffff;
  }
  header.app .brand .dot {
    color: var(--accent);
    text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
  }
  header.app .grow { flex: 1; }
  header.app .server {
    font-family: var(--mono); color: var(--accent-2);
    background: rgba(59, 130, 246, 0.12); padding: 3px 10px; border-radius: var(--radius-inner);
    border: 1px solid rgba(59, 130, 246, 0.35);
    max-width: 320px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
  }
  .led {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: var(--fg-mute); vertical-align: middle;
    transition: background 0.3s, box-shadow 0.3s;
  }
  
  @keyframes pulse-good {
    0% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.8), 0 0 0 0 rgba(16, 185, 129, 0.45); }
    70% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.8), 0 0 0 12px rgba(16, 185, 129, 0); }
    100% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.8), 0 0 0 0 rgba(16, 185, 129, 0); }
  }
  @keyframes pulse-warn {
    0% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.8), 0 0 0 0 rgba(245, 158, 11, 0.45); }
    70% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.8), 0 0 0 12px rgba(245, 158, 11, 0); }
    100% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.8), 0 0 0 0 rgba(245, 158, 11, 0); }
  }
  @keyframes pulse-bad {
    0% { box-shadow: 0 0 8px rgba(239, 68, 68, 0.8), 0 0 0 0 rgba(239, 68, 68, 0.45); }
    70% { box-shadow: 0 0 8px rgba(239, 68, 68, 0.8), 0 0 0 12px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 8px rgba(239, 68, 68, 0.8), 0 0 0 0 rgba(239, 68, 68, 0); }
  }

  .led.on    { background: var(--good); animation: pulse-good 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  .led.warn  { background: var(--warn); animation: pulse-warn 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  .led.bad   { background: var(--bad);  animation: pulse-bad 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 999px;
    background: var(--bg-3); border: 1px solid var(--border);
    color: #ffffff; font-size: 12px; font-weight: 600;
  }
  
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    align-items: start;
  }
  .full { grid-column: 1 / -1; }
  
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 12px;
    min-width: 0;
    transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card:hover {
    border-color: rgba(59, 130, 246, 0.4);
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
  }
  .metric-card.good:hover {
    border-color: rgba(16, 185, 129, 0.5);
    box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
  }
  .metric-card.warn:hover {
    border-color: rgba(245, 158, 11, 0.5);
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.15);
  }
  .metric-card.bad:hover {
    border-color: rgba(239, 68, 68, 0.5);
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
  }
  .card h2 {
    margin: 0; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--fg-dim); font-weight: 700;
  }
  .card .value {
    font-size: 34px; font-weight: 700; font-family: var(--sans);
    color: #ffffff; line-height: 1.1;
  }
  .card .sub { font-size: 12px; color: var(--fg-dim); }
  
  .banner {
    background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5;
    padding: 12px 16px; border-radius: var(--radius-inner); margin: 16px 20px 0;
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .banner::before { content: "⚠️"; }
  .banner.warn { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.4); color: #fcd34d; }
  
  .empty-hint {
    color: var(--fg-mute); font-size: 12px; padding: 12px 14px;
  }
  
  /* metrics */
  .metric-card .row {
    display: flex; align-items: baseline; gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .metric-card .unit { color: var(--fg-dim); font-size: 13px; font-weight: 600; }
  .metric-card svg {
    width: 100%; height: 44px; display: block;
    overflow: visible;
  }
  
  /* Low-power OLED Area Chart Styles */
  .metric-card .spark-area  { fill: url(#spark-blue-grad); opacity: 0.15; transition: fill 0.3s; }
  .metric-card .spark-line  { fill: none; stroke: var(--accent); stroke-width: 2.2; filter: drop-shadow(0 2px 6px rgba(59, 130, 246, 0.5)); }
  .metric-card .spark-grid  { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
  
  .metric-card.good .value  { color: var(--good); }
  .metric-card.good .spark-line { stroke: var(--good); filter: drop-shadow(0 2px 6px rgba(16, 185, 129, 0.5)); }
  .metric-card.good .spark-area { fill: url(#spark-green-grad); }
  
  .metric-card.warn .value  { color: var(--warn); }
  .metric-card.bad  .value  { color: var(--bad); }
  .metric-card.warn .spark-line { stroke: var(--warn); filter: drop-shadow(0 2px 6px rgba(245, 158, 11, 0.5)); }
  .metric-card.warn .spark-area { fill: url(#spark-warn-grad); }
  .metric-card.bad  .spark-line { stroke: var(--bad); filter: drop-shadow(0 2px 6px rgba(239, 68, 68, 0.5)); }
  .metric-card.bad  .spark-area { fill: url(#spark-bad-grad); }
  .metric-card.disabled .value { color: var(--fg-mute); }

  .metric-card .metric-desc {
    max-height: 0px;
    opacity: 0;
    overflow: hidden;
    font-size: 11px;
    color: var(--fg-dim);
    transition: max-height 0.25s ease-out, opacity 0.25s ease-out, margin 0.25s ease-out;
    line-height: 1.4;
    padding: 0 2px;
  }
  .metric-card:hover .metric-desc {
    max-height: 120px;
    opacity: 1;
    margin-top: 6px;
    margin-bottom: 6px;
  }
  
  .pct-bar {
    height: 8px; background: #121214;
    border-radius: 999px; overflow: hidden;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  .pct-bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 999px;
  }
  .pct-bar.warn > span { background: var(--warn); }
  .pct-bar.bad  > span { background: var(--bad); }
  
  /* slots */
  .slot-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .slot {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    min-width: 0;
    transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .slot.idle { opacity: 0.7; }
  .slot:hover {
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
  }
  .slot.active {
    border-color: rgba(59, 130, 246, 0.7);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
    transform: translateY(-2px);
  }
  .slot.active:hover {
    border-color: rgba(59, 130, 246, 0.9);
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.45);
    transform: translateY(-3px);
  }
  .slot-head {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 13px;
  }
  .slot-head .id { color: #ffffff; font-weight: 600; }
  .slot-head .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--bg-3); color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--sans); font-weight: 600;
  }
  .slot-head .badge.active {
    background: rgba(59, 130, 246, 0.2); color: #ffffff; border-color: var(--accent);
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
  }
  .slot-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .slot-actions button {
    font-size: 11px; padding: 4px 10px;
    background: var(--bg-3);
  }
  .slot-actions button:hover {
    background: var(--bg-hover);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .slot .progress {
    display: grid; grid-template-columns: 1fr auto;
    gap: 10px; align-items: center;
    font-family: var(--mono); font-size: 12px; color: var(--fg-dim);
  }
  .slot .params {
    margin-top: 8px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 8px 10px;
    font-family: var(--mono); font-size: 11.5px; color: var(--fg-dim);
    display: grid; grid-template-columns: max-content 1fr;
    gap: 4px 12px; max-height: 40vh; overflow: auto;
  }
  .slot .params .k { color: var(--fg-mute); }
  .slot .params .v { color: #ffffff; word-break: break-all; }
  
  .slot details > summary {
    cursor: pointer; color: var(--accent-2); font-size: 12px;
    list-style: none; user-select: none;
    font-weight: 600;
    transition: color 0.2s;
    margin-top: 4px;
  }
  .slot details > summary:hover { color: var(--accent); }
  .slot details > summary::-webkit-details-marker { display: none; }
  .slot details > summary::before { content: "▸ "; }
  .slot details[open] > summary::before { content: "▾ "; }
  
  /* models / config */
  .kv-table {
    display: grid; grid-template-columns: max-content 1fr;
    gap: 6px 16px; font-family: var(--mono); font-size: 12px;
  }
  .kv-table .k { color: var(--fg-mute); }
  .kv-table .v { color: #ffffff; word-break: break-all; }
  
  .model-list {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    margin-top: 8px;
  }
  .model-card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .model-card:hover {
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.05);
  }
  .model-card.active {
    border-color: rgba(59, 130, 246, 0.7);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.25);
    background: rgba(59, 130, 246, 0.05);
  }
  .model-card.active:hover {
    border-color: rgba(59, 130, 246, 0.9);
    box-shadow: 0 0 18px rgba(59, 130, 246, 0.4);
  }
  .model-card .name {
    font-family: var(--mono); font-size: 13px; word-break: break-all; font-weight: 600;
  }
  .badge {
    display: inline-block; font-size: 11px;
    padding: 2px 8px; border-radius: 999px;
    background: var(--bg-3); color: var(--fg-dim);
    border: 1px solid var(--border);
    font-weight: 600;
  }
  .badge.status-loaded   { background: rgba(16, 185, 129, 0.2); color: #34d399; border-color: rgba(16, 185, 129, 0.4); }
  .badge.status-loading  { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border-color: rgba(245, 158, 11, 0.4); }
  .badge.status-unloaded { background: var(--bg-3); color: var(--fg-mute); }
  .badge.status-sleeping { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: rgba(59, 130, 246, 0.4); }
  .badge.status-failed   { background: rgba(239, 68, 68, 0.2); color: #f87171; border-color: rgba(239, 68, 68, 0.4); }
  
  .args-block {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 8px 10px;
    font-family: var(--mono); font-size: 11.5px; color: var(--fg-dim);
    overflow: auto; white-space: pre-wrap; word-break: break-all;
    max-height: 200px;
  }
  .row-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row-actions button { font-size: 11px; padding: 4px 10px; }
  
  /* modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  @keyframes modal-show {
    0% { transform: scale(0.96); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .modal {
    background: var(--bg-2); border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: var(--radius); padding: 22px; min-width: 300px;
    max-width: 480px; box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
    display: flex; flex-direction: column; gap: 16px;
    animation: modal-show 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal h3 { margin: 0; font-size: 16px; font-weight: 700; color: #ffffff; }
  .modal .body { color: var(--fg-dim); font-size: 13px; line-height: 1.55; }
  .modal .body code { color: #ffffff; background: var(--bg-3); padding: 2px 5px; border-radius: 4px; }
  .modal .actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal .actions button.primary {
    background: var(--accent); border-color: rgba(255, 255, 255, 0.1); color: #ffffff;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
  }
  .modal .actions button.primary:hover { background: var(--accent-hover); }
  .modal .warn { color: var(--warn); font-size: 12px; font-weight: 600; }
  
  /* log panel */
  .log-card { gap: 10px; }
  .log-toolbar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    background: var(--bg-2); padding: 8px 12px; border-radius: var(--radius-inner);
    border: 1px solid var(--border);
  }
  .log-toolbar input[type="search"] { min-width: 180px; flex: 1; }
  .log-view {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 12px 14px;
    font-family: var(--mono); font-size: 12px; line-height: 1.5;
    color: #e2e8f0;
    max-height: 50vh; overflow: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .log-view .ln { display: block; margin-bottom: 2px; }
  .log-view .ln.hidden { display: none; }
  
  /* ANSI Terminal Colors - Bright Neon OLED shades */
  .ansi-30 { color: #4b5563; } .ansi-31 { color: #ff6b6b; }
  .ansi-32 { color: #10b981; } .ansi-33 { color: #fbbf24; }
  .ansi-34 { color: #3b82f6; } .ansi-35 { color: #d946ef; }
  .ansi-36 { color: #06b6d4; } .ansi-37 { color: #f4f4f5; }
  .ansi-90 { color: #71717a; } .ansi-91 { color: #f87171; }
  .ansi-92 { color: #34d399; } .ansi-93 { color: #fde047; }
  .ansi-94 { color: #60a5fa; } .ansi-95 { color: #e879f9; }
  .ansi-96 { color: #22d3ee; } .ansi-97 { color: #ffffff; }
  .ansi-bold { font-weight: 700; }
  
  .info-btn {
    cursor: pointer; color: var(--fg-mute); background: transparent;
    border: none; padding: 0 4px; font-size: 14px;
    transition: color 0.2s;
  }
  .info-btn:hover { color: var(--accent-2); }
  
  /* guidance */
  .guidance-list {
    display: flex; flex-direction: column; gap: 10px;
  }
  .suggestion {
    border: 1px solid var(--border);
    background: var(--bg-2);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color 0.2s;
  }
  .suggestion .head {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .suggestion .body {
    font-size: 12.5px; color: var(--fg-dim); line-height: 1.5;
  }
  .suggestion .body strong { color: #ffffff; }
  
  .suggestion.severity-info { border-left: 4px solid var(--accent); }
  .suggestion.severity-warn { border-left: 4px solid var(--warn); }
  .suggestion.severity-bad  { border-left: 4px solid var(--bad); }
  
  .sev-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    background: var(--bg-3); color: var(--fg-dim); border: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  }
  .sev-badge.info { color: var(--accent-2); border-color: rgba(59, 130, 246, 0.4); }
  .sev-badge.warn { color: #fbbf24; border-color: rgba(245, 158, 11, 0.4); }
  .sev-badge.bad  { color: #f87171; border-color: rgba(239, 68, 68, 0.4); }
  
  /* a11y / focus */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  
  /* footer */
  footer.app {
    padding: 20px; color: var(--fg-mute); font-size: 12px;
    text-align: center; border-top: 1px solid var(--border);
    margin-top: 24px;
    background: var(--bg-2);
  }
  footer.app a { color: var(--fg-dim); text-decoration: none; font-weight: 500; }
  footer.app a:hover { color: var(--accent-2); text-decoration: underline; }
  
  /* header last-update */
  header.app .last-update {
    color: var(--fg-mute); font-size: 11px; font-family: var(--mono);
  }
  
  /* very narrow mobile */
  @media (max-width: 360px) {
    header.app .brand { font-size: 14px; }
    header.app .server { display: none; }
    main { padding: 12px 10px; gap: 12px; }
    .card { padding: 12px; }
    .card .value { font-size: 24px; }
  }
  /* honor user reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    .led, .pct-bar > span { transition: none; animation: none; }
  }
  /* responsive */
  @media (max-width: 480px) {
    header.app { padding: 10px 14px; gap: 10px; }
    header.app .server { max-width: 140px; font-size: 11px; }
    main { padding: 16px 12px; gap: 16px; }
    .card .value { font-size: 26px; }
  }

  /* chat styling */
  .chat-card { padding: 0; overflow: hidden; border-radius: var(--radius); }
  .chat-head {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    transition: background 0.2s;
  }
  .chat-head:hover { background: var(--bg-hover); }
  .chat-head h2 {
    margin: 0; font-size: 12px; letter-spacing: 0.1em;
    color: var(--fg-dim); text-transform: uppercase; font-weight: 700;
  }
  .chat-head .pill {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--bg-3); color: var(--fg); border: 1px solid var(--border);
    font-weight: 500;
  }
  .chat-head .grow { flex: 1; }
  .chat-body {
    display: grid; grid-template-columns: 1fr 300px; gap: 0;
    min-height: 420px; height: 600px; max-height: 80vh;
    background: var(--bg-2);
    overflow: hidden;
  }
  .chat-body[hidden] { display: none; }
  
  .chat-main {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0;
    height: 100%;
    background: var(--bg-2);
  }
  .chat-side {
    display: flex; flex-direction: column; gap: 14px;
    padding: 16px; overflow-y: auto;
    background: var(--bg-2);
    border-left: 1px solid var(--border);
  }
  .chat-side label {
    font-size: 11px; color: var(--accent-2);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
    display: flex; flex-direction: column; gap: 6px;
  }
  .chat-side input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    background: var(--bg-3);
    height: 6px;
    border-radius: 3px;
    outline: none;
  }
  .chat-side .row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 10px; align-items: center;
  }
  .chat-side .row .v {
    font-family: var(--mono); font-size: 12px; color: var(--fg);
    min-width: 42px; text-align: right;
    background: var(--bg-3); padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .chat-side textarea {
    font: inherit; color: inherit;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 8px; resize: vertical;
    min-height: 70px;
    transition: border-color 0.2s;
  }
  .chat-side textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .chat-side button {
    margin-top: auto;
    padding: 8px;
    background: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    border-color: rgba(239, 68, 68, 0.3);
  }
  .chat-side button:hover {
    background: rgba(239, 68, 68, 0.25);
    border-color: rgba(239, 68, 68, 0.5);
  }

  .chat-msgs {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
    background: var(--bg-2);
  }
  
  .chat-msg { display: flex; flex-direction: column; gap: 6px; max-width: 85%; }
  .chat-msg .who {
    font-size: 11px; color: var(--fg-mute);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
  }
  
  .chat-msg.user { align-self: flex-end; }
  .chat-msg.user .who { color: var(--accent-2); text-align: right; }
  .chat-msg.assistant { align-self: flex-start; }
  .chat-msg.assistant .who { color: var(--good); }
  
  .chat-msg .body {
    background: var(--bg-2); border: 1.5px solid var(--border);
    border-radius: 14px 14px 14px 2px; padding: 12px 16px;
    word-wrap: break-word; overflow-wrap: break-word;
    color: var(--fg);
    line-height: 1.6;
  }
  .chat-msg.user .body {
    background: var(--bg-2);
    border-color: var(--accent);
    border-radius: 14px 14px 2px 14px;
    color: #ffffff;
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
  }
  
  .chat-msg .stats {
    font-family: var(--mono); font-size: 11px; color: var(--fg-mute);
    margin-top: 2px;
  }
  .chat-msg.user .stats { text-align: right; }
  
  .chat-msg .body > *:first-child { margin-top: 0; }
  .chat-msg .body > *:last-child { margin-bottom: 0; }
  .chat-msg .body p { margin: 8px 0; }
  .chat-msg .body h1, .chat-msg .body h2, .chat-msg .body h3,
  .chat-msg .body h4, .chat-msg .body h5, .chat-msg .body h6 {
    margin: 16px 0 8px; line-height: 1.3; font-weight: 600; color: #ffffff;
  }
  .chat-msg .body h1 { font-size: 18px; }
  .chat-msg .body h2 { font-size: 16px; }
  .chat-msg .body h3 { font-size: 15px; }
  .chat-msg .body h4, .chat-msg .body h5, .chat-msg .body h6 { font-size: 14px; }
  
  .chat-msg .body code {
    background: #0f0f12; padding: 2px 6px; border-radius: 4px;
    font-size: 12.5px; border: 1px solid var(--border);
    color: #38bdf8;
  }
  .chat-msg.user .body code {
    background: #0f0f12;
    color: #93c5fd;
    border: 1px solid rgba(59, 130, 246, 0.3);
  }
  .chat-msg .body pre {
    background: var(--bg-2); border: 1.5px solid var(--border);
    border-radius: var(--radius-inner); padding: 12px 14px;
    overflow-x: auto; margin: 10px 0;
  }
  .chat-msg.user .body pre {
    border-color: rgba(59, 130, 246, 0.4);
  }
  .chat-msg .body pre code {
    background: transparent; padding: 0; font-size: 12px; border: none; color: #e2e8f0;
  }
  .chat-msg .body ul, .chat-msg .body ol { margin: 8px 0; padding-left: 20px; }
  .chat-msg .body li { margin: 4px 0; }
  .chat-msg .body blockquote {
    margin: 10px 0; padding: 6px 14px;
    border-left: 4px solid var(--accent); color: var(--fg-dim);
    background: rgba(255, 255, 255, 0.02);
    border-radius: 0 var(--radius-inner) var(--radius-inner) 0;
  }
  .chat-msg .body hr {
    border: 0; border-top: 1px solid var(--border); margin: 14px 0;
  }
  
  .chat-msg .body table {
    border-collapse: collapse; margin: 12px 0;
    font-size: 12.5px; width: 100%;
  }
  .chat-msg .body th, .chat-msg .body td {
    border: 1px solid var(--border); padding: 6px 10px; text-align: left;
  }
  .chat-msg .body th { background: var(--bg-3); font-weight: 600; color: #ffffff; }
  .chat-msg .body a { color: var(--accent-2); text-decoration: underline; }
  .chat-msg.user .body a { color: #ffffff; text-decoration: underline; }
  .chat-msg .body strong { color: #ffffff; }
  .chat-msg.user .body strong { color: #ffffff; }
  .chat-msg .body em { font-style: italic; }
  
  .chat-input-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 10px; padding: 12px 16px;
    border-top: 1px solid var(--border); background: var(--bg-2);
    align-items: end;
  }
  .chat-input-row textarea {
    font: inherit; color: inherit;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-inner); padding: 8px 12px;
    resize: none; min-height: 38px; max-height: 200px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  .chat-input-row textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .chat-input-row button {
    white-space: nowrap;
    padding: 8px 16px;
    height: 38px;
  }
  .chat-input-row button.primary {
    background: var(--accent); border-color: rgba(255,255,255,0.05); color: #ffffff;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
  }
  .chat-input-row button.primary:hover { background: var(--accent-hover); }
  .chat-input-row button.danger {
    background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #ffd3cf;
  }
  .chat-input-row button.danger:hover { background: rgba(239, 68, 68, 0.25); }
  
  .chat-empty {
    color: var(--fg-mute); font-size: 13px; text-align: center;
    padding: 40px 20px;
    font-weight: 500;
  }
  .chat-typing {
    color: var(--good); font-size: 11px; font-family: var(--mono);
    text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
  }
  @media (max-width: 720px) {
    .chat-body { grid-template-columns: 1fr; height: 70vh; max-height: 90vh; }
    .chat-side { border-top: 1px solid var(--border); border-right: none; }
    .chat-main { border-right: none; }
    .chat-msg { max-width: 95%; }
  }

</style>
</head>

/* Resolve a key for the active language, fallback to English. */
function t(key, vars) {
  const dict = I18N[state.lang] || {};
  let s = dict[key];
  if (s === undefined) s = I18N.en[key];
  if (s === undefined) s = key;
  if (vars) {
    s = s.replace(/\{(\w+)\}/g, (m, k) => (vars[k] !== undefined ? String(vars[k]) : m));
  }
  return s;
}

/* ──────────────────────────────────────────────────────────────────────
 *  URL parameter parser. All settings live here — no localStorage.
 * ──────────────────────────────────────────────────────────────────── */
function parseParams() {
  const u = new URL(window.location.href);
  const q = u.searchParams;
  return {
    server: (q.get("server") || "").trim(),
    model:  (q.get("model")  || "").trim(),
    poll:   clampInt(q.get("poll"), 1000, 200, 60_000),
    log:    q.has("log") ? q.get("log") : null,   /* null = auto-detect */
    lang:   (q.get("lang") || "").trim(),
    prompt: q.get("prompt") || "",                /* prefill chat input */
    demo:   demoMode(q.get("demo")),              /* "", "1", or "router" */
  };
}
function clampInt(s, fallback, min, max) {
  const n = parseInt(s, 10);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}
function demoMode(v) {
  /* Only "1" (single) and "router" enable the mock; anything else stays
   * live so a typo like ?demo=true doesn't silently swap real metrics. */
  const s = (v || "").trim();
  return s === "1" || s === "router" ? s : "";
}

/* Pick a UI language from ?lang, then navigator.language, then 'en'. */
function pickLang(requested) {
  const supported = Object.keys(I18N);
  if (requested && supported.includes(requested)) return requested;
  const nav = (navigator.language || "en").toLowerCase();
  if (nav.startsWith("ru")) return "ru";
  return "en";
}

/* ──────────────────────────────────────────────────────────────────────
 *  Global state. One object, no hidden globals.
 * ──────────────────────────────────────────────────────────────────── */
const params = parseParams();
const state = {
  params,
  lang: pickLang(params.lang),
  serverBase: deriveServerBase(params.server),
  /* set in later phases */
  mode: null,           /* "single" | "router" */
  selectedModel: params.model || null,
  props: null,
  models: [],
  loraAdapters: [],
  metrics: null,
  slots: [],
  history: { metrics: [], slots: [] }, /* time series buffers */
  paused: false,
  /* `healthy` flips true only when /props came back at least once.
   * The status LED reads this — never `lastUpdate` alone — so a
   * pause/resume or visibility toggle can't lie about server state. */
  healthy: false,
  pollers: [],          /* {name, abort, timer} */
  errors: [],           /* visible error banners */
  lastUpdate: null,
  ui: {
    bootDone: false,
    logEnabled: false,
  },
};

function deriveServerBase(raw) {
  if (!raw) return window.location.origin;
  try {
    const url = new URL(raw, window.location.href);
    /* Whitelist http(s) only — javascript:, data:, file: etc. would either
     * fail in fetch or behave surprisingly. Better to surface early. */
    if (url.protocol !== "http:" && url.protocol !== "https:") {
      return window.location.origin;
    }
    return url.origin + (url.pathname.replace(/\/+$/, ""));
  } catch (_e) {
    /* report at boot time, fall back to current origin */
    return window.location.origin;
  }
}

/* ──────────────────────────────────────────────────────────────────────
 *  Tiny DOM helpers
 * ──────────────────────────────────────────────────────────────────── */
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "class") node.className = attrs[k];
    else if (k === "style") node.style.cssText = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") {
      node.addEventListener(k.slice(2), attrs[k]);
    } else if (k === "data") {
      for (const dk in attrs.data) node.dataset[dk] = attrs.data[dk];
    } else if (attrs[k] !== undefined && attrs[k] !== null) {
      node.setAttribute(k, attrs[k]);
    }
  }
  if (children !== undefined) {
    if (Array.isArray(children)) {
      for (const c of children) {
        if (c == null) continue;
        node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
    } else if (typeof children === "string") {
      node.textContent = children;
    } else {
      node.appendChild(children);
    }
  }
  return node;
}

/* Render every element with data-i18n="key" using the current language. */
function applyI18n(root) {
  const scope = root || document;
  scope.querySelectorAll("[data-i18n]").forEach((n) => {
    n.textContent = t(n.dataset.i18n);
  });
}

/* ──────────────────────────────────────────────────────────────────────
 *  Header wiring
 * ──────────────────────────────────────────────────────────────────── */
function initHeader() {
  $("#server-display").textContent = state.serverBase;
  $("#server-display").title = state.serverBase;
  const sel = $("#lang-select");
  sel.value = state.lang;
  sel.addEventListener("change", () => {
    const u = new URL(window.location.href);
    u.searchParams.set("lang", sel.value);
    window.location.href = u.toString();
  });
  document.documentElement.lang = state.lang;
  applyI18n();
}

/* Status LED: 'connecting' | 'online' | 'warn' | 'offline' | 'error' */
function setStatus(state_, textKey) {
  const led = $("#status-led");
  const txt = $("#status-text");
  led.classList.remove("on", "warn", "bad");
  if (state_ === "online")  led.classList.add("on");
  if (state_ === "warn")    led.classList.add("warn");
  if (state_ === "offline") led.classList.add("bad");
  if (state_ === "error")   led.classList.add("bad");
  txt.dataset.i18n = textKey;
  txt.textContent = t(textKey);
}

/* Push / clear an error banner. id de-duplicates. */
function showBanner(id, message, severity) {
  const wrap = $("#banners");
  let n = wrap.querySelector('[data-id="' + cssEscape(id) + '"]');
  if (!n) {
    n = el("div", { class: "banner" + (severity === "warn" ? " warn" : ""), data: { id } });
    wrap.appendChild(n);
  } else {
    n.className = "banner" + (severity === "warn" ? " warn" : "");
  }
  n.textContent = message;
}
function clearBanner(id) {
  const wrap = $("#banners");
  const n = wrap.querySelector('[data-id="' + cssEscape(id) + '"]');
  if (n) n.remove();
}
function cssEscape(s) { return String(s).replace(/[^\w-]/g, "_"); }

/* ──────────────────────────────────────────────────────────────────────
 *  Networking — every fetch is wrapped, surfaces an error if it fails,
 *  and is abortable so we can cancel in flight when the page unloads
 *  or the model selection changes.
 * ──────────────────────────────────────────────────────────────────── */
function endpoint(path, withModel) {
  const base = state.serverBase.replace(/\/+$/, "");
  let url = base + path;
  if (withModel && state.mode === "router" && state.selectedModel) {
    const sep = url.includes("?") ? "&" : "?";
    url += sep + "model=" + encodeURIComponent(state.selectedModel);
  }
  return url;
}

/* ──────────────────────────────────────────────────────────────────────
 *  Demo mode — installs a fetch shim that returns synthetic responses
 *  shaped exactly like real llama-server. Activated by ?demo=1 (single
 *  mode) or ?demo=router (router mode). Lets the dashboard run on
 *  static hosting (e.g. GitHub Pages) without any backend.
 *
 *  Real fetch is preserved for cross-origin requests we don't simulate
 *  (e.g. external link previews — we don't make any, but defensively).
 * ──────────────────────────────────────────────────────────────────── */
function installDemoShim(mode) {
  const realFetch = window.fetch.bind(window);
  const t0 = Date.now();
  const matchesServer = (url) => {
    try {
      const u = new URL(url, window.location.href);
      return u.origin === new URL(state.serverBase, window.location.href).origin;
    } catch (_e) { return false; }
  };

  /* Counters that grow over time so cumulative cards animate. */
  const counters = () => {
    const sec = (Date.now() - t0) / 1000;
    return {
      prompt_tokens_total:        Math.floor(120 + sec * 14),
      tokens_predicted_total:     Math.floor(80 + sec * 27),
      prompt_seconds_total:       (sec * 0.18).toFixed(3),
      tokens_predicted_seconds_total: (sec * 0.62).toFixed(3),
      n_decode_total:             Math.floor(40 + sec * 5),
      n_tokens_max:               512 + Math.floor(sec / 30) * 64,
      n_busy_slots_per_decode:    (1.4 + Math.sin(sec / 8) * 0.6).toFixed(2),
    };
  };

  /* Gauges that oscillate. */
  const gauges = () => {
    const sec = (Date.now() - t0) / 1000;
    const wave = (period, amp, base) => base + Math.sin(sec / period) * amp;
    return {
      prompt_tokens_seconds:     Math.max(0, wave(11, 60, 95)).toFixed(2),
      predicted_tokens_seconds:  Math.max(0, wave(7, 22, 58)).toFixed(2),
      requests_processing:       Math.max(0, Math.round(wave(13, 1.4, 1.5))),
      requests_deferred:         Math.max(0, Math.round(wave(19, 1.1, 0.3))),
    };
  };

  const renderPrometheus = () => {
    const c = counters(), g = gauges();
    let out = "";
    const emit = (name, type, help, val) => {
      out += `# HELP llamacpp:${name} ${help}\n# TYPE llamacpp:${name} ${type}\nllamacpp:${name} ${val}\n`;
    };
    emit("prompt_tokens_total", "counter", "Number of prompt tokens processed.", c.prompt_tokens_total);
    emit("prompt_seconds_total", "counter", "Prompt process time", c.prompt_seconds_total);
    emit("tokens_predicted_total", "counter", "Number of generation tokens processed.", c.tokens_predicted_total);
    emit("tokens_predicted_seconds_total", "counter", "Predict process time", c.tokens_predicted_seconds_total);
    emit("n_decode_total", "counter", "Total number of llama_decode() calls", c.n_decode_total);
    emit("n_tokens_max", "counter", "Largest observed n_tokens.", c.n_tokens_max);
    emit("n_busy_slots_per_decode", "counter", "Average busy slots per decode.", c.n_busy_slots_per_decode);
    emit("prompt_tokens_seconds", "gauge", "Average prompt throughput in tokens/s.", g.prompt_tokens_seconds);
    emit("predicted_tokens_seconds", "gauge", "Average generation throughput in tokens/s.", g.predicted_tokens_seconds);
    emit("requests_processing", "gauge", "Number of requests processing.", g.requests_processing);
    emit("requests_deferred", "gauge", "Number of requests deferred.", g.requests_deferred);
    return out;
  };

  const sampleParams = {
    n_predict: 400, seed: 42, temperature: 0.7, dynatemp_range: 0,
    dynatemp_exponent: 1, top_k: 40, top_p: 0.95, min_p: 0.05,
    typical_p: 1, xtc_probability: 0, xtc_threshold: 0.1,
    repeat_last_n: 64, repeat_penalty: 1.05, presence_penalty: 0,
    frequency_penalty: 0, dry_multiplier: 0, dry_base: 1.75,
    mirostat: 0, mirostat_tau: 5, mirostat_eta: 0.1,
    samplers: ["dry", "top_k", "typ_p", "top_p", "min_p", "xtc", "temperature"],
  };

  const renderSlots = () => {
    const sec = (Date.now() - t0) / 1000;
    const out = [];
    for (let i = 0; i < 4; i++) {
      const isProc = ((Math.sin((sec + i * 1.7) / 4) + 1) / 2) > 0.55;
      const slot = {
        id: i, n_ctx: 1024, speculative: false, is_processing: isProc,
        n_prompt_tokens: isProc ? 50000 + i * 1000 : 0,
        n_prompt_tokens_processed: isProc ? 30000 + i * 500 : 0,
      };
      if (isProc) {
        slot.id_task = 1000 + i;
        slot.params = sampleParams;
        slot.next_token = {
          has_next_token: true, has_new_line: false,
          n_remain: Math.floor(400 - ((sec * 8) % 380)),
          n_decoded: Math.floor((sec * 8) % 380),
        };
      }
      out.push(slot);
    }
    return out;
  };

  const propsResp = {
    default_generation_settings: { ...sampleParams },
    total_slots: 4,
    model_path: mode === "router" ? "/models/qwen2.5-1.5b-instruct-q4_0.gguf"
                                  : "/opt/models/demo-model.gguf",
    chat_template: "{% for message in messages %}<|im_start|>{{ message.role }}\n{{ message.content }}<|im_end|>\n{% endfor %}<|im_start|>assistant\n",
    chat_template_caps: { tools: false, vision: false },
    modalities: { vision: false, audio: false },
    media_marker: "<__media__>",
    build_info: { build_number: "demo-9999", commit: "0000000" },
    is_sleeping: false,
  };

  const v1ModelsResp = {
    object: "list",
    data: [{
      id: mode === "router" ? "ggml-org/qwen2.5-1.5b-instruct-gguf:Q4_0" : "demo-model",
      object: "model",
      created: Math.floor(t0 / 1000),
      owned_by: "llamacpp",
      meta: {
        n_vocab: 151936, n_ctx_train: 32768, n_embd: 1536,
        n_params: 1543714304, size: 932512384,
      },
    }],
  };

  const modelsResp = mode === "router" ? [
    {
      id: "ggml-org/qwen2.5-1.5b-instruct-gguf:Q4_0",
      in_cache: true,
      path: "/cache/qwen2.5-1.5b-instruct-q4_0.gguf",
      status: { value: "loaded",
                args: ["-m", "/cache/qwen2.5-1.5b-instruct-q4_0.gguf",
                       "-c", "4096", "--parallel", "4", "--metrics"],
                failed: false, exit_code: null },
    },
    {
      id: "ggml-org/llama-3.2-1b-instruct-gguf:Q4_K_M",
      in_cache: true,
      path: "/cache/llama-3.2-1b.gguf",
      status: { value: "unloaded", args: [], failed: false, exit_code: null },
    },
    {
      id: "ggml-org/qwen2.5-7b-instruct-gguf:Q4_K_M",
      in_cache: false,
      path: null,
      status: { value: "failed",
                args: ["-m", "/cache/qwen2.5-7b.gguf", "-ngl", "99"],
                failed: true, exit_code: 137 },
    },
  ] : null;

  const cannedReplies = [
    `# Demo response\n\nThis dashboard is running in **demo mode** — every endpoint is synthetic. The real one talks to a [llama.cpp](https://github.com/ggml-org/llama.cpp) server.\n\n## What works\n\n- Streaming with throttled re-render\n- Markdown: lists, tables, code\n- Cancel mid-stream\n\n\`\`\`js\n// example\nfunction hello(name) {\n  return \`Hello, \${name}!\`;\n}\n\`\`\`\n\n| Metric | Source |\n|---|---|\n| tok/s | \`/metrics\` |\n| slots | \`/slots\` |\n| model | \`/v1/models\` |\n\n> Try clicking ⓘ on any card.`,
    `Sure — quick rundown of the relevant flags:\n\n1. **\`--metrics\`** turns on \`/metrics\` (Prometheus).\n2. **\`--parallel N\`** sets concurrent slots; KV memory ≈ N × ctx_size × hidden_dim × 2.\n3. **\`-ngl L\`** offloads L layers to GPU. Set to 99 to offload everything when VRAM allows.\n4. **\`--ctx-size C\`** is total context shared across slots in single mode.\n\n*This is the demo response — no real model behind it.*`,
    `Here's a small table of common sampling presets:\n\n| Preset | temp | top_p | repeat_penalty |\n|--------|------|-------|----------------|\n| chat   | 0.7  | 0.95  | 1.05           |\n| code   | 0.2  | 0.95  | 1.0            |\n| creative | 1.0 | 0.95 | 1.1            |\n\nUse \`temperature = 0\` for deterministic output (greedy). Setting \`mirostat\` to 1 or 2 ignores top_p / top_k entirely.`,
  ];

  const streamingChat = (body) => {
    const replyIdx = (chat.messages.length / 2) | 0;
    const text = cannedReplies[replyIdx % cannedReplies.length];
    const tokens = text.split(/(\s+)/).filter(Boolean);
    let signal = body && body.signal;
    const stream = new ReadableStream({
      async start(controller) {
        const enc = new TextEncoder();
        try {
          for (let i = 0; i < tokens.length; i++) {
            if (signal && signal.aborted) {
              controller.close(); return;
            }
            const chunk = { choices: [{ delta: { content: tokens[i] } }] };
            controller.enqueue(enc.encode("data: " + JSON.stringify(chunk) + "\n\n"));
            await new Promise((r) => setTimeout(r, 30 + Math.random() * 50));
          }
          const usage = {
            prompt_tokens: 24 + Math.floor(Math.random() * 30),
            completion_tokens: tokens.length,
            total_tokens: 0,
          };
          usage.total_tokens = usage.prompt_tokens + usage.completion_tokens;
          controller.enqueue(enc.encode("data: " + JSON.stringify({ usage }) + "\n\n"));
          controller.enqueue(enc.encode("data: [DONE]\n\n"));
          controller.close();
        } catch (e) {
          controller.error(e);
        }
      },
    });
    return new Response(stream, {
      status: 200,
      headers: { "Content-Type": "text/event-stream" },
    });
  };

  const json = (obj, status) =>
    new Response(JSON.stringify(obj),
      { status: status || 200, headers: { "Content-Type": "application/json" } });
  const text = (str, status, type) =>
    new Response(str,
      { status: status || 200, headers: { "Content-Type": type || "text/plain; version=0.0.4" } });
  const notFound = () => new Response("not found", { status: 404 });

  window.fetch = function (input, init) {
    const url = typeof input === "string" ? input : (input && input.url) || "";
    if (!matchesServer(url)) return realFetch(input, init);

    let path;
    try { path = new URL(url, window.location.href).pathname; }
    catch (_e) { return realFetch(input, init); }
    /* normalize: strip serverBase prefix path */
    try {
      const baseP = new URL(state.serverBase, window.location.href).pathname.replace(/\/+$/, "");
      if (baseP && path.startsWith(baseP)) path = path.slice(baseP.length) || "/";
    } catch (_e) {}

    const method = (init && init.method) || (typeof input !== "string" ? input.method : "GET") || "GET";

    if (path === "/health") return Promise.resolve(json({ status: "ok" }));
    if (path === "/props")  return Promise.resolve(json(propsResp));
    if (path === "/v1/models") return Promise.resolve(json(v1ModelsResp));
    if (path === "/models") {
      return Promise.resolve(modelsResp ? json(modelsResp) : notFound());
    }
    if (path === "/metrics") return Promise.resolve(text(renderPrometheus()));
    if (path === "/slots")   return Promise.resolve(json(renderSlots()));
    if (path === "/lora-adapters") return Promise.resolve(json([]));
    if (path === "/v1/chat/completions" && method.toUpperCase() === "POST") {
      return Promise.resolve(streamingChat(init || {}));
    }
    /* slot save/restore/erase, model load/unload — pretend success */
    if (path.startsWith("/slots/") || path.startsWith("/models/load") || path.startsWith("/models/unload")) {
      return Promise.resolve(json({ success: true, demo: true }));
    }
    /* server.log HEAD — return 404 so log panel hides cleanly */
    return Promise.resolve(notFound());
  };

  /* Surface the demo state to the user. Banner uses i18n key. */
  const showDemoBanner = () => {
    const wrap = $("#banners");
    if (!wrap) return;
    const key = mode === "router" ? "demo.banner_router" : "demo.banner_single";
    const node = el("div", { class: "banner", data: { id: "demo-mode" } }, t(key));
    wrap.appendChild(node);
  };
  /* applyI18n hasn't run yet — defer to next microtask */
  Promise.resolve().then(showDemoBanner);
}

async function fetchJSON(path, opts) {
  return fetchEndpoint(path, opts, "json");
}
async function fetchText(path, opts) {
  return fetchEndpoint(path, opts, "text");
}
async function fetchEndpoint(path, opts, kind) {
  const o = opts || {};
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), o.timeout || 8000);
  try {
    const res = await fetch(endpoint(path, o.withModel !== false), {
      method: o.method || "GET",
      headers: Object.assign(
        { "Accept": kind === "json" ? "application/json" : "text/plain" },
        o.headers || {}
      ),
      body: o.body,
      signal: o.signal || ctrl.signal,
      cache: "no-store",
    });
    clearTimeout(timer);
    if (!res.ok) {
      const errBody = await safeReadBody(res);
      /* Strip HTML responses (e.g. a CDN / static-host 404 page) from the
       * user-facing error message — printing raw markup is ugly and tells
       * the user nothing useful. Keep the first ~80 chars for non-HTML. */
      const looksHtml = /^\s*<(!doctype|html|head)/i.test(errBody || "");
      const tail = (errBody && !looksHtml) ? " — " + errBody.replace(/\s+/g, " ").slice(0, 80) : "";
      const e = new Error("HTTP " + res.status + tail);
      e.status = res.status;
      e.body = errBody;
      throw e;
    }
    if (kind === "json") return await res.json();
    if (kind === "text") return await res.text();
    return res;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === "AbortError") {
      const ae = new Error("aborted"); ae.aborted = true; throw ae;
    }
    throw e;
  }
}
async function safeReadBody(res) {
  try { return await res.text(); } catch (_) { return ""; }
}

/* ──────────────────────────────────────────────────────────────────────
 *  Polling engine. setTimeout chain with backoff + AbortController.
 *  Never setInterval — that allows requests to stack when the server
 *  is slow.
 * ──────────────────────────────────────────────────────────────────── */
function startPoller(name, intervalMs, taskFn) {
  let timer = null;
  let aborter = null;
  let stopped = false;
  let backoff = 0;       /* extra ms added on consecutive failures */
  const MAX_BACKOFF = 10_000;

  async function tick() {
    if (stopped) return;
    if (state.paused) {
      timer = setTimeout(tick, intervalMs);
      return;
    }
    aborter = new AbortController();
    try {
      await taskFn(aborter.signal);
      backoff = 0;
      clearBanner("poll-" + name);
    } catch (e) {
      if (e.aborted || e.name === "AbortError") {
        /* swallowed */
      } else {
        backoff = Math.min(MAX_BACKOFF, Math.max(1000, backoff ? backoff * 2 : 1000));
        showBanner(
          "poll-" + name,
          name + ": " + (e.message || t("error.fetch_failed")),
          "warn"
        );
      }
    }
    if (!stopped) timer = setTimeout(tick, intervalMs + backoff);
  }

  const handle = {
    name,
    stop() {
      stopped = true;
      if (timer) clearTimeout(timer);
      if (aborter) try { aborter.abort(); } catch (_) {}
    },
  };
  state.pollers.push(handle);
  /* fire first tick on next microtask to avoid stacking inside boot() */
  Promise.resolve().then(tick);
  return handle;
}

function stopAllPollers() {
  for (const p of state.pollers) p.stop();
  state.pollers = [];
}

/* Pause / resume hook for keyboard shortcut (Phase 9). */
function setPaused(v) {
  state.paused = !!v;
  if (state.paused) {
    setStatus("warn", "common.pause");
  } else if (state.healthy) {
    setStatus("online", "header.status.online");
  } else if (state.ui.bootDone) {
    setStatus("offline", "header.status.offline");
  } else {
    setStatus("connecting", "header.status.connecting");
  }
}

/* When the tab is hidden, abort in-flight requests and pause —
 * resume on visibility. Cheap battery / server-load saver. */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) setPaused(true);
  else setPaused(false);
});

/* ──────────────────────────────────────────────────────────────────────
 *  Boot sequence. Discovers single-model vs router mode, picks the
 *  active model in router mode, and hands control to the poller setup
 *  function (defined in later phases). Phase 2 only verifies wiring.
 * ──────────────────────────────────────────────────────────────────── */
async function boot() {
  /* Install the demo fetch shim before initHeader / any fetch fires.
   * ?demo=1 → single-mode synthetic; ?demo=router → router-mode. */
  if (state.params.demo) {
    installDemoShim(state.params.demo === "router" ? "router" : "single");
  }

  initHeader();
  ensureRootScaffold();
  setStatus("connecting", "header.status.connecting");

  if (state.params.server && state.serverBase === window.location.origin
      && state.params.server !== window.location.origin) {
    /* deriveServerBase fell back; show the user. */
    showBanner("bad-url", t("error.bad_url") + ": " + state.params.server, "warn");
  }

  try {
    /* /health is the cheapest probe and works even when no model is loaded */
    await fetchJSON("/health", { withModel: false, timeout: 4000 });
  } catch (e) {
    setStatus("offline", "header.status.offline");
    showBanner("boot-health", t("error.fetch_failed") + ": /health — " + e.message, "warn");
    /* Continue anyway — some setups disable /health, and we still want
     * to attempt /props so the user sees what's reachable. */
  }

  /* /props is required — we use it to drive the rest of the UI */
  let props = null;
  try {
    props = await fetchJSON("/props", { withModel: false, timeout: 6000 });
    state.props = props;
    clearBanner("boot-props");
  } catch (e) {
    setStatus("error", "header.status.error");
    showBanner("boot-props", "/props — " + e.message);
  }

  /* /v1/models — universal across modes. May be empty in router mode
   * before any model is loaded. */
  try {
    const v1 = await fetchJSON("/v1/models", { withModel: false, timeout: 6000 });
    state.v1models = (v1 && Array.isArray(v1.data)) ? v1.data : [];
  } catch (e) {
    state.v1models = [];
    /* not fatal */
  }

  /* Router-mode detection: GET /models. If it returns 200 with a list of
   * objects whose status has a 'value' field, this is router mode.
   * 404 / not-array / wrong shape → single mode. */
  state.mode = "single";
  state.models = [];
  try {
    const m = await fetchJSON("/models", { withModel: false, timeout: 6000 });
    /* router payload shape: { data: [...] } or just an array, depending on build */
    const list = Array.isArray(m) ? m
                 : (m && Array.isArray(m.data) ? m.data
                 : (m && Array.isArray(m.models) ? m.models : null));
    if (list && list.length && typeof list[0] === "object"
        && list[0] && list[0].status && typeof list[0].status === "object"
        && "value" in list[0].status) {
      state.mode = "router";
      state.models = list;
    }
  } catch (_e) { /* not router */ }

  /* If router and no explicit ?model=, pick the first loaded model, else
   * the first listed model. */
  if (state.mode === "router") {
    if (!state.selectedModel) {
      const loaded = state.models.find((x) => x.status && x.status.value === "loaded");
      const first  = state.models[0];
      state.selectedModel = (loaded && loaded.id) || (first && first.id) || null;
    }
  } else {
    state.selectedModel = null;
  }

  state.ui.bootDone = true;
  state.bootedAt = Date.now();
  state.lastUpdate = Date.now();
  /* Don't lie: only show "online" if /props came back. Otherwise leave
   * whichever error/offline state was set above so the LED matches the
   * banner. */
  if (state.props) {
    state.healthy = true;
    setStatus("online", "header.status.online");
  } else if (!state.params.demo && !state.params.server) {
    /* User opened the page on a static host with neither ?demo nor
     * ?server. They probably don't realise the dashboard is trying to
     * call /metrics on the page's own origin. Tell them what to do. */
    showBanner("no-server",
      t("hint.no_server.title") + " " + t("hint.no_server.body"), "warn");
  }

  renderBootSummary();
  renderChatPanel();
  renderGuidance();
  startCorePollers();
  startSecondaryPollers();
  /* fire-and-forget log detection — never blocks the dashboard */
  startLogPoller().catch(() => {});
}

/* Bare minimum scaffold so later phases have stable mount points to
 * write into. Each phase adds detail to one of these slots. */
function ensureRootScaffold() {
  const root = $("#root");
  root.innerHTML = "";
  root.appendChild(el("div", { id: "metrics-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "slots-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "chat-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "models-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "config-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "lora-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "log-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "guidance-section", class: "full",
                               style: "display: contents;" }));
}

/* Render Models, Server config, and LoRA cards. Re-callable; on each call
 * we rebuild the section content. Cheap because it's not on the hot path. */
function renderBootSummary() {
  renderModelsCard();
  renderServerConfigCard();
  renderLoraCard();
}

function findV1Meta(modelId) {
  if (!Array.isArray(state.v1models)) return null;
  return state.v1models.find((m) => m && (m.id === modelId)) || null;
}

function renderModelsCard() {
  const sec = $("#models-section");
  sec.innerHTML = "";
  const card = el("div", { class: "card full" }, [
    el("h2", null, t("models.title")),
  ]);
  sec.appendChild(card);

  if (state.mode === "router") {
    /* selector + per-model cards */
    const sel = el("select", { id: "model-selector",
                               style: "max-width: 100%; min-width: 200px;",
                               onchange: () => onModelSelect($("#model-selector").value) });
    sel.appendChild(el("option", { value: "" }, "— " + t("models.selector") + " —"));
    for (const m of state.models) {
      sel.appendChild(el("option", {
        value: m.id,
        selected: m.id === state.selectedModel ? "selected" : null,
      }, m.id));
    }
    card.appendChild(el("div", { class: "row-actions" }, [
      el("span", { class: "sub" }, t("models.selector") + ":"),
      sel,
    ]));

    if (state.models.length === 0) {
      card.appendChild(el("div", { class: "sub" }, t("models.no_models")));
    } else {
      const list = el("div", { class: "model-list" });
      for (const m of state.models) list.appendChild(routerModelCard(m));
      card.appendChild(list);
    }
  } else {
    /* single-model: show the active model's metadata.
     * If neither /v1/models nor /props came back, render a "no data"
     * note instead of a fake card with a placeholder name like "model"
     * and a green "loaded" badge. */
    const id = (state.v1models[0] && state.v1models[0].id)
            || (state.props && state.props.model_path)
            || null;
    if (!id) {
      card.appendChild(el("div", { class: "sub" }, t("models.no_data")));
      return;
    }
    const meta = findV1Meta(id) || state.v1models[0] || null;
    card.appendChild(singleModelCard(id, meta));
  }
}

function routerModelCard(m) {
  const status = (m.status && m.status.value) || "unknown";
  const isActive = m.id === state.selectedModel;
  const meta = findV1Meta(m.id);
  const node = el("div", { class: "model-card" + (isActive ? " active" : "") }, [
    el("div", { class: "name" }, m.id),
    el("div", { class: "row-actions" }, [
      el("span", { class: "badge status-" + status }, t("models.status." + status)
        || t("models.status.unknown")),
      m.in_cache ? el("span", { class: "badge" }, t("models.cached")) : null,
      (m.status && m.status.failed && m.status.exit_code !== undefined && m.status.exit_code !== null)
        ? el("span", { class: "badge status-failed" },
            t("models.exit_code") + " " + m.status.exit_code)
        : null,
    ].filter(Boolean)),
    m.path ? el("div", { class: "sub" },
      el("span", { class: "badge" }, t("model.path")) )
      : null,
    m.path ? el("div", { class: "sub", style: "word-break: break-all;" }, m.path) : null,
  ]);
  if (meta && meta.meta) {
    node.appendChild(metaKVTable(meta.meta));
  }
  if (m.status && Array.isArray(m.status.args) && m.status.args.length) {
    const argsTxt = m.status.args.join(" ");
    const block = el("div", { class: "args-block" }, argsTxt);
    node.appendChild(block);
    node.appendChild(el("div", { class: "row-actions" }, [
      el("button", {
        onclick: (e) => copyToClipboard(argsTxt, e.currentTarget),
      }, t("common.copy")),
    ]));
  }
  /* load / unload buttons */
  const actions = el("div", { class: "row-actions" }, []);
  if (status === "loaded" || status === "sleeping") {
    actions.appendChild(el("button", {
      onclick: () => confirmAction(
        t("models.confirm.unload", { name: m.id }),
        () => callLoadOrUnload("/models/unload", m.id, "unload")
      ),
    }, t("models.actions.unload")));
  } else {
    actions.appendChild(el("button", {
      onclick: () => confirmAction(
        t("models.confirm.load", { name: m.id }),
        () => callLoadOrUnload("/models/load", m.id, "load")
      ),
    }, t("models.actions.load")));
  }
  node.appendChild(actions);
  return node;
}

function singleModelCard(id, meta) {
  const props = state.props || {};
  const card = el("div", { class: "model-card" }, [
    el("div", { class: "name" }, id),
    el("div", { class: "row-actions" }, [
      props.is_sleeping
        ? el("span", { class: "badge status-sleeping" }, t("models.status.sleeping"))
        : el("span", { class: "badge status-loaded" }, t("models.status.loaded")),
    ]),
  ]);
  if (props.model_path) {
    card.appendChild(el("div", { class: "kv-table" }, [
      el("div", { class: "k" }, t("model.path")),
      el("div", { class: "v" }, props.model_path),
    ]));
  }
  if (meta && meta.meta) card.appendChild(metaKVTable(meta.meta));
  return card;
}

function metaKVTable(meta) {
  const rows = [];
  function row(labelKey, val) {
    rows.push(el("div", { class: "k" }, t(labelKey)));
    rows.push(el("div", { class: "v" }, val == null ? "—" : String(val)));
  }
  if (meta.n_vocab !== undefined)      row("model.n_vocab",     meta.n_vocab);
  if (meta.n_ctx_train !== undefined)  row("model.n_ctx_train", meta.n_ctx_train);
  if (meta.n_embd !== undefined)       row("model.n_embd",      meta.n_embd);
  if (meta.n_params !== undefined)     row("model.n_params",    fmtNumber(meta.n_params));
  if (meta.size !== undefined)         row("model.size",        fmtBytes(meta.size));
  return el("div", { class: "kv-table" }, rows);
}

function fmtBytes(n) {
  if (!isFinite(n) || n == null) return "—";
  if (n >= 1024 * 1024 * 1024) return (n / (1024 * 1024 * 1024)).toFixed(2) + " GB";
  if (n >= 1024 * 1024) return (n / (1024 * 1024)).toFixed(2) + " MB";
  if (n >= 1024) return (n / 1024).toFixed(1) + " KB";
  return n + " B";
}

/* ──────────────────────────────────────────────────────────────────────
 *  Server config card. Router shows the actual CLI args; single mode
 *  shows what /props exposes plus a clear note that args are not
 *  available from the server.
 * ──────────────────────────────────────────────────────────────────── */
function renderServerConfigCard() {
  const sec = $("#config-section");
  sec.innerHTML = "";
  const card = el("div", { class: "card full" }, [
    el("h2", null, t("config.title")),
  ]);
  sec.appendChild(card);

  if (state.mode === "router") {
    card.appendChild(el("div", { class: "sub" }, t("config.router_args")));
    if (!state.models.length) {
      card.appendChild(el("div", { class: "sub" }, t("models.no_models")));
      return;
    }
    const list = el("div", { class: "model-list" });
    for (const m of state.models) {
      const args = (m.status && Array.isArray(m.status.args)) ? m.status.args.join(" ") : "";
      const block = el("div", { class: "model-card" }, [
        el("div", { class: "name" }, m.id),
        args ? el("div", { class: "args-block" }, args)
             : el("div", { class: "sub" }, t("common.empty")),
        args ? el("div", { class: "row-actions" }, [
          el("button", {
            onclick: (e) => copyToClipboard(args, e.currentTarget),
          }, t("common.copy")),
        ]) : null,
      ].filter(Boolean));
      list.appendChild(block);
    }
    card.appendChild(list);
  } else {
    /* If /props never came back, don't fake an "effective config" with
     * default-derived booleans (e.g. is_sleeping=No is meaningless when
     * we never reached the server). */
    if (!state.props) {
      card.appendChild(el("div", { class: "sub" }, t("config.no_data")));
      return;
    }
    card.appendChild(el("div", { class: "sub" }, t("config.effective_subset")));
    const props = state.props;
    const meta = (state.v1models[0] && state.v1models[0].meta) || {};
    const rows = [];
    function add(label, v) {
      if (v === undefined || v === null || v === "") return;
      rows.push(el("div", { class: "k" }, label));
      rows.push(el("div", { class: "v" }, typeof v === "object" ? JSON.stringify(v) : String(v)));
    }
    add("model_path",   props.model_path);
    add("total_slots",  props.total_slots);
    add("modalities",   props.modalities && Object.keys(props.modalities)
                          .filter((k) => props.modalities[k]).join(", "));
    add("chat_template (preview)",
        props.chat_template
          ? props.chat_template.split("\n").slice(0, 3).join(" / ").slice(0, 200)
          : null);
    add("build_info",   props.build_info);
    if (props.is_sleeping !== undefined) {
      add("is_sleeping", props.is_sleeping ? t("common.yes") : t("common.no"));
    }
    if (props.default_generation_settings) {
      const dg = props.default_generation_settings;
      const dgKeys = ["temperature", "top_k", "top_p", "min_p",
                      "repeat_penalty", "n_predict"];
      for (const k of dgKeys) if (dg[k] !== undefined) add("default." + k, dg[k]);
    }
    add("n_ctx_train (model)", meta.n_ctx_train);
    card.appendChild(el("div", { class: "kv-table" }, rows));
    card.appendChild(el("div", { class: "sub warn",
      style: "color: var(--warn);"
    }, t("config.effective_note")));
  }
}

function renderLoraCard() {
  const sec = $("#lora-section");
  const adapters = Array.isArray(state.loraAdapters) ? state.loraAdapters : [];
  if (!adapters.length) {
    sec.style.display = "none";
    sec.innerHTML = "";
    return;
  }
  sec.style.display = "contents";
  sec.innerHTML = "";
  const card = el("div", { class: "card full" }, [
    el("h2", null, t("lora.title")),
  ]);
  sec.appendChild(card);
  const tbl = el("div", { class: "kv-table" }, [
    el("div", { class: "k" }, t("lora.id")),
    el("div", { class: "k" }, t("lora.path")),
